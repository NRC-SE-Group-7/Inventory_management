<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inventory Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="d-flex">
      <nav class="sidebar d-none d-lg-block"><div class="px-3 mb-3 text-center"><img src="assets/img/logo.svg" alt="logo" style="height:42px"></div></nav>
      <div class="content flex-fill">
        <header class="topbar d-flex align-items-center justify-content-between">
          <h5 class="mb-0">Inventory Tracking</h5>
        </header>
        <main class="mt-4">
          <div class="row g-3">
            <div class="col-md-6">
              <div class="card-modern p-3">
                <h6>Stock In</h6>
                <form class="row g-2">
                  <div class="col-12"><input class="form-control" placeholder="Product"></div>
                  <div class="col-6"><input class="form-control" placeholder="Qty" type="number"></div>
                  <div class="col-6"><input class="form-control" placeholder="Reference"></div>
                  <div class="col-12 text-end"><button class="btn btn-primary btn-sm">Add Stock</button></div>
                </form>
              </div>
            </div>
            <div class="col-md-6">
              <div class="card-modern p-3">
                <h6>Stock Out</h6>
                <form class="row g-2">
                  <div class="col-12"><input class="form-control" placeholder="Product"></div>
                  <div class="col-6"><input class="form-control" placeholder="Qty" type="number"></div>
                  <div class="col-6"><input class="form-control" placeholder="Reference"></div>
                  <div class="col-12 text-end"><button class="btn btn-danger btn-sm">Remove Stock</button></div>
                </form>
              </div>
            </div>
          </div>
          <div class="card-modern p-3 mt-3">
            <div class="d-flex justify-content-between mb-2"><h6 class="mb-0">Inventory Movement</h6>
            <div><input class="form-control form-control-sm d-inline-block me-2" style="width:180px" placeholder="Filter product"><input class="form-control form-control-sm d-inline-block" style="width:180px" placeholder="Date range"></div></div>
            <div class="table-responsive"><table class="table table-sm"><thead><tr><th>Type</th><th>Product</th><th>Qty</th><th>Ref</th><th>Date</th></tr></thead><tbody><tr><td>In</td><td>AA Batteries</td><td>20</td><td>PO-200</td><td>2026-05-26</td></tr><tr><td>Out</td><td>USB C Cable</td><td>2</td><td>SO-302</td><td>2026-05-28</td></tr></tbody></table></div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
