<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Products — Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="d-flex">
      <nav class="sidebar d-none d-lg-block">
        <div class="px-3 mb-3 text-center"><img src="assets/img/logo.svg" alt="logo" style="height:42px"></div>
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
        </ul>
      </nav>
      <div class="content flex-fill">
        <header class="topbar d-flex align-items-center">
          <div><a href="#" data-toggle="sidebar" class="btn btn-sm btn-outline-secondary d-lg-none me-2"><i class="fa fa-bars"></i></a><h5 class="mb-0">Products</h5></div>
          <div>
            <a class="btn btn-primary btn-sm" href="#addProductModal" data-bs-toggle="modal"><i class="fa fa-plus me-1"></i> Add Product</a>
          </div>
        </header>

        <main class="mt-4">
          <div class="card-modern p-3">
            <div class="d-flex mb-3">
              <input class="form-control me-2" placeholder="Search products...">
              <button class="btn btn-outline-secondary">Search</button>
            </div>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead><tr><th>Product ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Price</th><th>Supplier</th><th>Actions</th></tr></thead>
                <tbody>
                  <tr><td>P-1001</td><td>AA Batteries</td><td>Electronics</td><td>12</td><td>$5.00</td><td>SupplyCo</td><td><button class="btn btn-sm btn-outline-primary">Edit</button> <button class="btn btn-sm btn-outline-danger">Delete</button></td></tr>
                  <tr><td>P-1002</td><td>USB C Cable</td><td>Accessories</td><td>2</td><td>$9.00</td><td>WireWorld</td><td><button class="btn btn-sm btn-outline-primary">Edit</button> <button class="btn btn-sm btn-outline-danger">Delete</button></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title">Add / Edit Product</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
            <form>
              <div class="row g-2">
                <div class="col-md-6"><label class="form-label">Product Name</label><input class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Category</label><input class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Quantity</label><input class="form-control" type="number"></div>
                <div class="col-md-4"><label class="form-label">Price</label><input class="form-control" type="text"></div>
                <div class="col-md-4"><label class="form-label">Supplier</label><input class="form-control"></div>
              </div>
            </form>
          </div>
          <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Save</button></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
