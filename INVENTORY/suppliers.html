<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Suppliers — Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="d-flex">
      <nav class="sidebar d-none d-lg-block"><div class="px-3 mb-3 text-center"><img src="assets/img/logo.svg" alt="logo" style="height:42px"></div></nav>
      <div class="content flex-fill">
        <header class="topbar d-flex align-items-center justify-content-between">
          <h5 class="mb-0">Suppliers</h5>
          <a class="btn btn-primary btn-sm" href="#">Add Supplier</a>
        </header>
        <main class="mt-4">
          <div class="card-modern p-3">
            <div class="d-flex mb-3">
              <input class="form-control me-2" placeholder="Search suppliers...">
              <button class="btn btn-outline-secondary">Search</button>
            </div>
            <div class="table-responsive">
              <table class="table table-hover">
                <thead><tr><th>#</th><th>Supplier</th><th>Contact</th><th>Products</th><th>Actions</th></tr></thead>
                <tbody>
                  <tr><td>1</td><td>SupplyCo</td><td>John Doe</td><td>12</td><td><button class="btn btn-sm btn-outline-primary">Details</button></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
