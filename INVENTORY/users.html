<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Users — Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="d-flex">
      <nav class="sidebar d-none d-lg-block"><div class="px-3 mb-3 text-center"><img src="assets/img/logo.svg" alt="logo" style="height:42px"></div></nav>
      <div class="content flex-fill">
        <header class="topbar d-flex align-items-center justify-content-between">
          <h5 class="mb-0">User Management</h5>
          <a class="btn btn-primary btn-sm" href="#">Add User</a>
        </header>
        <main class="mt-4">
          <div class="card-modern p-3">
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead><tr><th>#</th><th>User</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                <tbody>
                  <tr><td>1</td><td>Admin User</td><td>admin@company.com</td><td><span class="badge bg-primary badge-role">Admin</span></td><td><button class="btn btn-sm btn-outline-primary">Edit</button></td></tr>
                  <tr><td>2</td><td>Staff Member</td><td>staff@company.com</td><td><span class="badge bg-secondary badge-role">Staff</span></td><td><button class="btn btn-sm btn-outline-primary">Edit</button></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
