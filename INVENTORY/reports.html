<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reports — Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="d-flex">
      <nav class="sidebar d-none d-lg-block"><div class="px-3 mb-3 text-center"><img src="assets/img/logo.svg" alt="logo" style="height:42px"></div></nav>
      <div class="content flex-fill">
        <header class="topbar d-flex align-items-center justify-content-between">
          <h5 class="mb-0">Reports</h5>
          <div>
            <input class="form-control form-control-sm d-inline-block me-2" style="width:180px" placeholder="Start - End">
            <a class="btn btn-outline-secondary btn-sm" href="#">Export</a>
          </div>
        </header>
        <main class="mt-4">
          <div class="row g-3">
            <div class="col-md-4"><div class="card-modern p-3"><h6>Sales Report</h6><p class="text-muted small">Monthly sales overview</p></div></div>
            <div class="col-md-4"><div class="card-modern p-3"><h6>Inventory Report</h6><p class="text-muted small">Stock levels & movements</p></div></div>
            <div class="col-md-4"><div class="card-modern p-3"><h6>Supplier Report</h6><p class="text-muted small">Supplier performance</p></div></div>
          </div>
          <div class="card-modern p-3 mt-3"><canvas id="chartSales"></canvas></div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="assets/js/sample-data.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
