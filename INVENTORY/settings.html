<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings — Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="d-flex">
      <nav class="sidebar d-none d-lg-block"><div class="px-3 mb-3 text-center"><img src="assets/img/logo.svg" alt="logo" style="height:42px"></div></nav>
      <div class="content flex-fill">
        <header class="topbar d-flex align-items-center justify-content-between">
          <h5 class="mb-0">Settings</h5>
        </header>
        <main class="mt-4">
          <div class="row g-3">
            <div class="col-md-6"><div class="card-modern p-3">
              <h6>Company Info</h6>
              <form class="row g-2">
                <div class="col-12"><input class="form-control" placeholder="Company Name"></div>
                <div class="col-12"><input class="form-control" placeholder="Address"></div>
                <div class="col-12 text-end"><button class="btn btn-primary btn-sm">Save</button></div>
              </form>
            </div></div>
            <div class="col-md-6"><div class="card-modern p-3">
              <h6>Logo Upload</h6>
              <div class="border p-3 text-center"><img src="assets/img/logo.svg" alt="logo" style="height:56px"><div class="mt-2"><button class="btn btn-outline-secondary btn-sm">Upload</button></div></div>
            </div></div>
          </div>
          <div class="card-modern p-3 mt-3"><h6>Change Password</h6>
            <form class="row g-2"><div class="col-12"><input class="form-control" placeholder="Current password" type="password"></div><div class="col-md-6"><input class="form-control" placeholder="New password" type="password"></div><div class="col-md-6"><input class="form-control" placeholder="Confirm" type="password"></div><div class="col-12 text-end"><button class="btn btn-primary btn-sm">Change</button></div></form>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
