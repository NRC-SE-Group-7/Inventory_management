<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inventory — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
      <div class="card shadow-sm login-card w-100" style="max-width:420px;">
        <div class="card-body p-4">
          <div class="text-center mb-3">
            <img src="assets/img/logo.svg" alt="Company" class="mb-3" style="height:56px;">
            <h5 class="mb-0">Inventory Management</h5>
            <small class="text-muted">Sign in to continue</small>
          </div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Email or Username</label>
              <input id="username" type="text" class="form-control" placeholder="name@company.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input id="password" type="password" class="form-control" placeholder="••••••" required>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberCheck">
                <label class="form-check-label" for="rememberCheck">Remember me</label>
              </div>
              <a href="#" class="small">Forgot password?</a>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Simple client-side mock auth: validate form and redirect to dashboard
      document.getElementById('loginForm').addEventListener('submit', function(e){
        e.preventDefault();
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if(!u || !p){
          alert('Please enter username and password.');
          return;
        }
        // demo: accept any credentials and redirect
        window.location.href = 'dashboard.html';
      });
    </script>
  </body>
</html>
