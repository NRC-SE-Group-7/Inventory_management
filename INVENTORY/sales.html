<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sales — Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="d-flex">
      <nav class="sidebar d-none d-lg-block"><div class="px-3 mb-3 text-center"><img src="assets/img/logo.svg" alt="logo" style="height:42px"></div></nav>
      <div class="content flex-fill">
        <header class="topbar d-flex align-items-center justify-content-between">
          <h5 class="mb-0">Sales</h5>
          <div>
            <a class="btn btn-outline-secondary btn-sm" href="#">Export</a>
            <a class="btn btn-primary btn-sm" href="#">Add Sale</a>
          </div>
        </header>
        <main class="mt-4">
          <div class="row g-3">
            <div class="col-md-4">
              <div class="card-modern p-3"><small class="text-muted">Today</small><div class="h5">$1,230</div></div>
            </div>
            <div class="col-md-4"><div class="card-modern p-3"><small class="text-muted">This Month</small><div class="h5">$23,400</div></div></div>
            <div class="col-md-4"><div class="card-modern p-3"><small class="text-muted">This Year</small><div class="h5">$198,230</div></div></div>
          </div>

          <div class="card-modern p-3 mt-3">
            <div class="d-flex mb-3">
              <input class="form-control me-2" placeholder="Search sales...">
              <select class="form-select me-2" style="width:160px"><option>All</option><option>Paid</option></select>
              <button class="btn btn-outline-secondary">Filter</button>
            </div>
            <div class="table-responsive"><table class="table table-hover"><thead><tr><th>Sale ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody><tr><td>S-1001</td><td>Acme Inc</td><td>$250</td><td><span class="badge bg-success">Paid</span></td><td>2026-05-28</td><td><a href="#" class="btn btn-sm btn-outline-secondary">Receipt</a></td></tr></tbody></table></div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
